<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de Envío</title>
    <!-- CDN de SweetAlert2 para alertas elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #0b2545;
            --accent-color: #134074;
            --whatsapp-color: #25D366;
            --maps-color: #4285F4;
            --bg-color: #f4f6f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-container img {
            max-width: 60px;
            height: auto;
            border-radius: 50%;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header p {
            color: #555;
            font-size: 14px;
            margin: 0;
        }

        .folio-box {
            background-color: #eef4fa;
            border-left: 4px solid var(--accent-color);
            padding: 10px 15px;
            margin-bottom: 25px;
            border-radius: 0 6px 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .folio-box span {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .folio-box strong {
            font-size: 16px;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group label span {
            font-weight: normal;
            color: #777;
            font-size: 12px;
            display: block;
            margin-top: 2px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-control:disabled {
            background-color: #eaedf1;
            cursor: not-allowed;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .maps-wrapper {
            display: flex;
            gap: 10px;
        }

        .btn-maps {
            background-color: var(--maps-color);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            transition: background-color 0.3s;
        }

        .btn-maps:hover {
            background-color: #357ae8;
        }

        .btn-maps:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        .maps-loader-text {
            display: none;
            font-size: 12px;
            color: var(--maps-color);
            font-weight: bold;
            margin-top: 5px;
            align-items: center;
            gap: 5px;
        }

        .maps-loader-text.active {
            display: flex;
        }

        .spinner-mini {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(66, 133, 244, 0.2);
            border-top-color: var(--maps-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit {
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(37, 211, 102, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background-color: #20ba59;
        }

        .btn-submit:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* PANTALLA DE CARGA CON TU GIF ANIMADO */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .loader-image-container {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .loading-text {
            color: var(--primary-color);
            font-size: 17px;
            font-weight: 600;
            margin-top: 25px;
            text-align: center;
            padding: 0 20px;
            max-width: 420px;
            line-height: 1.4;
            letter-spacing: -0.2px;
        }

        .loading-folio {
            margin-top: 15px;
            font-size: 13px;
            color: var(--accent-color);
            font-weight: bold;
            background: #eef4fa;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<!-- Pantalla de carga integrada con tu archivo GIF y respaldo automático -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loader-image-container">
        <img id="gifLoader" src="9262d7f1dae810ffe0fa5431d9c187bf.gif" alt="Guardando envío..." onerror="cargarRespaldoCSS()">
    </div>
    <div class="loading-text">Espera por favor, procesando los datos de tu envío...</div>
    <div id="loadingFolioText" class="loading-folio">Folio: Generando...</div>
</div>

<div class="form-container">
    <div class="header">
        <div class="logo-container">
            <img src="ChatGPT Image 20 jun 2026, 02_10_54 p.m..png" alt="Logo" onerror="this.style.display='none';"> 
        </div>
        <h1>Datos de Envío</h1>
        <p>Por favor, completa la información para procesar tu paquete.</p>
    </div>

    <div class="folio-box">
        <span>NÚMERO DE FOLIO:</span>
        <strong id="folioDisplay">------</strong>
    </div>

    <form id="shippingForm" onsubmit="validarAntesDeEnviar(event)" oninput="validarFormulario()">
        
        <!-- 1. Nombre Completo -->
        <div class="form-group">
            <label for="nombre">1. NOMBRE COMPLETO DEL DESTINATARIO
                <span>Tal como aparecerá en la entrega.</span>
            </label>
            <input type="text" id="nombre" class="form-control" required placeholder="Ej. Juan Pérez García">
        </div>

        <!-- 2. Dirección Completa -->
        <div class="form-group">
            <label for="direccion">2. DIRECCIÓN DE ENTREGA (CALLE Y NÚMERO)
                <span>Incluye calle, número exterior e interior (si aplica).</span>
            </label>
            <textarea id="direccion" class="form-control" required placeholder="Ej. Av. Juárez #123 Interior 4"></textarea>
        </div>

        <!-- Colonia / Barrio -->
        <div class="form-group">
            <label for="colonia">COLONIA / BARRIO
                <span>Especifica el asentamiento o zona de la entrega.</span>
            </label>
            <input type="text" id="colonia" class="form-control" required placeholder="Ej. Centro / Lomas del Valle">
        </div>

        <!-- 3. Número de Teléfono -->
        <div class="form-group">
            <label for="telefono">3. NÚMERO DE TELÉFONO DE CONTACTO
                <span>Número al que puedan llamar en caso de incidencia.</span>
            </label>
            <input type="tel" id="telefono" class="form-control" required placeholder="Ej. 3312345678">
        </div>

        <!-- 4. Ciudad y Estado/Provincia -->
        <div class="form-group">
            <label for="ciudadEstado">4. CIUDAD Y ESTADO/PROVINCIA
                <span>Para garantizar una correcta logística de envío.</span>
            </label>
            <input type="text" id="ciudadEstado" class="form-control" required placeholder="Ej. Guadalajara, Jalisco">
        </div>

        <!-- 5. Código Postal -->
        <div class="form-group">
            <label for="cp">5. CÓDIGO POSTAL
                <span>Importante para validar la zona de cobertura.</span>
            </label>
            <input type="text" id="cp" class="form-control" required placeholder="Ej. 45400">
        </div>

        <!-- 6. Referencias Adicionales -->
        <div class="form-group">
            <label for="referencias">6. REFERENCIAS ADICIONALES
                <span>Puntos de referencia, indicaciones visuales o comentarios de ayuda.</span>
            </label>
            <textarea id="referencias" class="form-control" required placeholder="Ej. Fachada azul frente a tienda de abarrotes"></textarea>
        </div>

        <!-- 7. Ubicación Google Maps -->
        <div class="form-group">
            <label for="maps">7. UBICACIÓN EN GOOGLE MAPS
                <span>Pega el enlace o presiona el botón para capturarla en vivo.</span>
            </label>
            <div class="maps-wrapper">
                <input type="url" id="maps" class="form-control" required placeholder="https://maps.google.com/...">
                <button type="button" id="btnMapsGPS" class="btn-maps" onclick="obtenerUbicacion()">Mi Ubicación GPS</button>
            </div>
            <div id="mapsLoader" class="maps-loader-text">
                <div class="spinner-mini"></div>
                <span>Obteniendo coordenadas GPS, por favor espera...</span>
            </div>
        </div>

        <button type="submit" id="btnSubmitForm" class="btn-submit" disabled>
            Enviar por WhatsApp
        </button>
    </form>
</div>

<script>
let folioUnico = "";

function generarFolio() {
    const fecha = new Date();
    const año = fecha.getFullYear().toString().substring(2); 
    const mes = (fecha.getMonth() + 1).toString().padStart(2, '0'); 
    const dia = fecha.getDate().toString().padStart(2, '0'); 
    const aleatorio = Math.floor(1000 + Math.random() * 9000); 
    
    folioUnico = `ENV-${año}${mes}${dia}-${aleatorio}`;
    
    document.getElementById('folioDisplay').innerText = folioUnico;
    document.getElementById('loadingFolioText').innerText = `Folio: ${folioUnico}`;
}

// FUNCIÓN ACTUALIZADA: Muestra la información de la guía al entrar a la página
window.onload = function() {
    generarFolio();
    validarFormulario();
    
    // Alerta informativa inicial sobre la tarifa y tiempos de Estafeta
    Swal.fire({
        title: 'Información de Envío',
        html: `El costo de la guía es de <b>$99.00 MXN</b> para toda la República Mexicana.<br><br>Tu paquete será enviado a través de <b>Estafeta</b> con un tiempo estimado de entrega de <b>4 a 6 días hábiles</b>.`,
        icon: 'info',
        confirmButtonColor: '#134074',
        confirmButtonText: 'Entendido, llenar datos'
    });
};

function validarFormulario() {
    const formulario = document.getElementById('shippingForm');
    const btnSubmit = document.getElementById('btnSubmitForm');
    
    if (formulario.checkValidity()) {
        btnSubmit.disabled = false;
    } else {
        btnSubmit.disabled = true;
    }
}

function obtenerUbicacion() {
    const inputMaps = document.getElementById('maps');
    const btnGPS = document.getElementById('btnMapsGPS');
    const textLoader = document.getElementById('mapsLoader');

    if (navigator.geolocation) {
        inputMaps.disabled = true;
        btnGPS.disabled = true;
        textLoader.classList.add('active');

        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            inputMaps.value = `https://maps.google.com/?q=${lat},${lon}`;
            
            inputMaps.disabled = false;
            btnGPS.disabled = false;
            textLoader.classList.remove('active');

            validarFormulario();

            Swal.fire({
                title: '¡Ubicación Agregada!',
                text: 'Coordenadas GPS cargadas correctamente en el formulario.',
                icon: 'success',
                confirmButtonColor: '#134074',
                confirmButtonText: 'Entendido'
            });

        }, function(error) {
            inputMaps.disabled = false;
            btnGPS.disabled = false;
            textLoader.classList.remove('active');
            validarFormulario();

            Swal.fire({
                title: 'No se pudo obtener la ubicación',
                text: 'Por favor, introduce o pega el enlace de Google Maps manualmente.',
                icon: 'warning',
                confirmButtonColor: '#0b2545',
                confirmButtonText: 'Escribir manualmente'
            });
        });
    } else {
        Swal.fire({
            title: 'No compatible',
            text: 'Tu navegador o dispositivo no soporta el acceso a la geolocalización.',
            icon: 'error',
            confirmButtonColor: '#0b2545'
        });
    }
}

function validarAntesDeEnviar(event) {
    event.preventDefault();

    Swal.fire({
        title: '¿Confirmar datos de envío?',
        text: "Asegúrate de que la dirección y el número de contacto sean correctos antes de continuar.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#25D366',
        cancelButtonColor: '#0b2545',
        confirmButtonText: 'Sí, son correctos',
        cancelButtonText: 'Revisar de nuevo'
    }).then((result) => {
        if (result.isConfirmed) {
            ejecutarProcesamiento();
        }
    });
}

function ejecutarProcesamiento() {
    enviarWhatsApp();

    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('active');

    setTimeout(function() {
        overlay.classList.remove('active');
        
        document.getElementById('shippingForm').reset();
        generarFolio();
        validarFormulario();
    }, 4000);
}

function enviarWhatsApp() {
    const telefonoDestino = "523318297670";

    const nombre = document.getElementById('nombre').value;
    const direccion = document.getElementById('direccion').value;
    const colonia = document.getElementById('colonia').value;
    const telefonoContacto = document.getElementById('telefono').value;
    const ciudadEstado = document.getElementById('ciudadEstado').value;
    const cp = document.getElementById('cp').value;
    const referencias = document.getElementById('referencias').value;
    const maps = document.getElementById('maps').value;

    const mensajePlano = `*NUEVOS DATOS DE ENVÍO*\n` +
                         `*Folio:* ${folioUnico}\n\n` +
                         `*1. Nombre:* ${nombre}\n` +
                         `*2. Dirección:* ${direccion}\n` +
                         `*Colonia:* ${colonia}\n` +
                         `*3. Teléfono:* ${telefonoContacto}\n` +
                         `*4. Ciudad/Estado:* ${ciudadEstado}\n` +
                         `*5. C.P.:* ${cp}\n` +
                         `*6. Referencias:* ${referencias}\n` +
                         `*7. Google Maps:* ${maps}`;

    const mensajeCodificado = encodeURIComponent(mensajePlano);
    const urlWhatsApp = `https://api.whatsapp.com/send?phone=${telefonoDestino}&text=${mensajeCodificado}`;

    window.open(urlWhatsApp, '_blank');
}

function cargarRespaldoCSS() {
    const contenedor = document.querySelector('.loader-image-container');
    contenedor.innerHTML = `
        <div style="width: 80px; height: 80px; transform-style: preserve-3d; animation: floatBox 1.6s ease-in-out infinite alternate;">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M60 60 L15 38 L15 83 L60 105 Z" fill="#cc935a" />
                <path d="M60 60 L105 38 L105 83 L60 105 Z" fill="#b57f4c" />
                <path d="M60 15 L105 38 L60 60 L15 38 Z" fill="#e5ab71" />
                <path d="M42 24 L87 46 L78 50 L33 28 Z" fill="#5c3a21" opacity="0.85" />
                <path d="M60 60 L60 105 L65 102 L65 57 Z" fill="#5c3a21" opacity="0.4" />
            </svg>
        </div>
    `;
    
    if (!document.getElementById('css-float-animation')) {
        const style = document.createElement('style');
        style.id = 'css-float-animation';
        style.innerHTML = `@keyframes floatBox { 0% { transform: translateY(0px); } 100% { transform: translateY(-15px); } }`;
        document.head.appendChild(style);
    }
}
</script>

</body>
</html>
